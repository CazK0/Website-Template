{% extends "base.html" %}

{% block content %}
<section class="py-20 px-6 max-w-5xl mx-auto">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-extrabold tracking-tight">Admin Dashboard</h1>
        <div class="flex items-center gap-4">
            <span class="bg-blue-100 text-blue-700 py-1 px-3 rounded-full text-sm font-bold">Internal Use Only</span>
            <a href="/logout" class="text-sm font-bold text-slate-500 hover:text-red-600 transition">Logout</a>
        </div>
    </div>
    
    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="bg-slate-50 border-b border-slate-200">
                    <th class="py-4 px-6 font-bold text-sm text-slate-500 uppercase tracking-wider">ID</th>
                    <th class="py-4 px-6 font-bold text-sm text-slate-500 uppercase tracking-wider">Email</th>
                    <th class="py-4 px-6 font-bold text-sm text-slate-500 uppercase tracking-wider">Message</th>
                </tr>
            </thead>
            <tbody>
                {% for msg in messages %}
                <tr class="border-b border-slate-100 hover:bg-slate-50 transition">
                    <td class="py-4 px-6 text-slate-400">{{ msg.id }}</td>
                    <td class="py-4 px-6 font-medium text-slate-900">{{ msg.email }}</td>
                    <td class="py-4 px-6 text-slate-600">{{ msg.message }}</td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="py-8 text-center text-slate-500 italic">No messages in the database yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
