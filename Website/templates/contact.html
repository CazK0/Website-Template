{% extends "base.html" %}

{% block content %}
<section class="py-20 px-6 max-w-3xl mx-auto text-center">
    <h1 class="text-5xl font-extrabold mb-6 tracking-tight">Get in touch</h1>
    <p class="text-xl text-slate-500 mb-12">Have questions about Lumina? We'd love to hear from you.</p>

    {% if success %}
        <div class="bg-green-50 border border-green-200 text-green-800 rounded-xl p-8 shadow-sm">
            <div class="text-4xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold mb-2">Message Sent!</h3>
            <p>Thanks for reaching out. Our team will get back to you shortly.</p>
            <a href="/contact" class="inline-block mt-6 text-green-700 font-bold hover:underline">Send another message</a>
        </div>
    {% else %}
        <form method="POST" action="/contact" class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200 text-left">
            <div class="mb-6">
                <label for="email" class="block text-sm font-bold text-slate-700 mb-2">Email Address</label>
                <input type="email" id="email" name="email" required
                       class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"
                       placeholder="you@company.com">
            </div>

            <div class="mb-8">
                <label for="message" class="block text-sm font-bold text-slate-700 mb-2">How can we help?</label>
                <textarea id="message" name="message" rows="4" required
                          class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition"
                          placeholder="Tell us about your team and workflow..."></textarea>
            </div>

            <button type="submit" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-blue-700 transition shadow-lg shadow-blue-900/50">
                Send Message
            </button>
        </form>
    {% endif %}
</section>
{% endblock %}
