{% extends "base.html" %}

{% block content %}
<section class="py-20 px-6 max-w-md mx-auto">
    <h1 class="text-4xl font-extrabold mb-8 text-center tracking-tight">Admin Login</h1>

    {% if error %}
        <div class="bg-red-50 text-red-600 p-4 rounded-xl mb-6 text-center font-medium border border-red-200">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="POST" action="/login" class="bg-white p-8 rounded-2xl shadow-xl border border-slate-200">
        <div class="mb-6">
            <label for="username" class="block text-sm font-bold text-slate-700 mb-2">Username</label>
            <input type="text" id="username" name="username" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
        </div>

        <div class="mb-8">
            <label for="password" class="block text-sm font-bold text-slate-700 mb-2">Password</label>
            <input type="password" id="password" name="password" required
                   class="w-full px-4 py-3 rounded-xl border border-slate-300 focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition">
        </div>

        <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold text-lg hover:bg-slate-800 transition shadow-lg">
            Sign In
        </button>
    </form>
</section>
{% endblock %}
